    <text x="838" y="103" fill="#9a9da3" font-size="15" font-weight="600">SLEEPRADAR · MQTT DISCOVERY</text>
    <text x="838" y="148" fill="#e8e8ea" font-size="34" font-weight="700">5 Home Assistant entities</text>

    <g transform="translate(832 176)">
