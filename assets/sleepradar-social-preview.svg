      <text x="340" y="34" fill="#9a9da3" font-size="15" text-anchor="end">measured</text>
    </g>
    <g transform="translate(832 242)">
      <rect width="366" height="58" rx="11" fill="#151617" stroke="#2b2d31"/>
      <circle cx="24" cy="29" r="7" fill="#5aa2ff"/>
      <text x="45" y="35" fill="#e8e8ea" font-size="20" font-weight="600">Breathing</text>
      <text x="340" y="34" fill="#9a9da3" font-size="15" text-anchor="end">measured</text>
    </g>
    <g transform="translate(832 308)">
      <rect width="366" height="58" rx="11" fill="#151617" stroke="#2b2d31"/>
      <circle cx="24" cy="29" r="7" fill="#f5a623"/>
      <text x="45" y="35" fill="#e8e8ea" font-size="20" font-weight="600">Sleep stage</text>
      <text x="340" y="34" fill="#f5a623" font-size="15" text-anchor="end">Aqara estimate</text>
    </g>
    <g transform="translate(832 374)">
      <rect width="366" height="58" rx="11" fill="#151617" stroke="#2b2d31"/>
      <circle cx="24" cy="29" r="7" fill="#5aa2ff"/>
      <text x="45" y="35" fill="#e8e8ea" font-size="20" font-weight="600">Body movement</text>
      <text x="340" y="34" fill="#9a9da3" font-size="15" text-anchor="end">measured</text>
    </g>
    <g transform="translate(832 440)">
      <rect width="366" height="58" rx="11" fill="#151617" stroke="#2b2d31"/>
      <circle cx="24" cy="29" r="7" fill="#5aa2ff"/>
      <text x="45" y="35" fill="#e8e8ea" font-size="20" font-weight="600">Illuminance</text>
      <text x="340" y="34" fill="#9a9da3" font-size="15" text-anchor="end">measured</text>
    </g>

    <path d="M838 529h354" stroke="#2b2d31"/>
    <text x="838" y="558" fill="#9a9da3" font-size="16">No wearable · No Docker bridge</text>
