# Optional template helpers for SleepRadar.
#
# Pre-wired to the add-on's own default entity IDs (sensor.aqara_fp2_sleep_*).
# Copy this in as-is unless you changed mqtt_node_id from the default
# "aqara_fp2_sleep" in the add-on configuration — in that case, update the
# three states('sensor.aqara_fp2_sleep_*') references below to match.

- sensor:
    # Plain sleep stage. Aqara codes 1 and 2 are both "awake", so we show a
    # single "Awake" instead of the confusing "in bed" vs "awake" split. The
    # raw code stays available as an attribute.
    - name: "FP2 Sleep Phase"
      unique_id: fp2_sleep_phase
      state: >
        {% set code = states('sensor.aqara_fp2_sleep_sleep_state') | int(-1) %}
        {% set phases = {
          0: 'Out of bed',
          1: 'Awake',
          2: 'Awake',
          3: 'REM',
          4: 'Light sleep',
          5: 'Deep sleep'
        } %}
        {{ phases.get(code, 'Unknown') }}
      icon: >
        {% set phase = this.state | default('Unknown') %}
        {% if phase == 'Deep sleep' %} mdi:weather-night
        {% elif phase == 'Light sleep' %} mdi:power-sleep
        {% elif phase == 'REM' %} mdi:brain
        {% elif phase == 'Awake' %} mdi:eye
        {% elif phase == 'Out of bed' %} mdi:bed-empty
        {% else %} mdi:help-circle-outline
        {% endif %}
      attributes:
        raw_code: "{{ states('sensor.aqara_fp2_sleep_sleep_state') }}"
      availability: >
        {{ states('sensor.aqara_fp2_sleep_sleep_state')
           not in ['unavailable', 'unknown', 'none', none] }}

    # Plain-language live read: what the sensor sees right now, in one line.
    # Good as the primary text of a Mushroom template card.
    - name: "FP2 Sleep Now"
      unique_id: fp2_sleep_now
      state: >
        {% set code = states('sensor.aqara_fp2_sleep_sleep_state') | int(-1) %}
        {% set hr = states('sensor.aqara_fp2_sleep_heart_rate') %}
        {% set br = states('sensor.aqara_fp2_sleep_respiration_rate') %}
        {% set names = {
          0: 'Out of bed', 1: 'Awake in bed', 2: 'Awake in bed',
          3: 'REM', 4: 'Light sleep', 5: 'Deep sleep'
        } %}
        {% set phase = names.get(code, 'Unknown') %}
        {% if code in [1, 2, 3, 4, 5] %}
        {{ phase }} - heart {{ hr }}, breathing {{ br }}
        {% else %}{{ phase }}{% endif %}
      icon: mdi:bed-clock
      availability: >
        {{ states('sensor.aqara_fp2_sleep_sleep_state')
           not in ['unavailable', 'unknown', 'none', none] }}

- binary_sensor:
    # "Asleep" = the sensor reports a sleep stage (REM, light, or deep).
    - name: "FP2 Asleep"
      unique_id: fp2_asleep
      state: >
        {% set code = states('sensor.aqara_fp2_sleep_sleep_state') | int(-1) %}
        {{ code in [3, 4, 5] }}
      icon: >
        {{ 'mdi:sleep' if this.state == 'on' else 'mdi:sleep-off' }}
      availability: >
        {{ states('sensor.aqara_fp2_sleep_sleep_state')
           not in ['unavailable', 'unknown', 'none', none] }}
