name: ha-app-docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  install-docs:
    name: install-docs lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: florianhorner/engineering-standards/actions/ha-app-docs-lint@ha-docs-v1
        with:
          profile: addon
