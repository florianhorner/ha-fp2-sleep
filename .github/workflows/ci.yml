name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Check whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -n "$BASE_SHA" ] \
            && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            git diff --check "$BASE_SHA...$HEAD_SHA"
          else
            git diff --check
          fi

      - name: Check Python syntax
        run: python -m py_compile aqara_fp2_sleep/aqara_fp2_sleep_poller.py scripts/validate_repository.py videos/quiet_proof_loops.py videos/validate-gif-batch.py videos/build-gif-deliverables.py

      - name: Lint YAML
        run: yamllint -c .yamllint .

      - name: Validate add-on package
        run: python scripts/validate_repository.py

      - name: Validator drift self-test
        run: python3 scripts/validate_repository.py --self-test

      - name: Validate GIF sources
        run: python3 videos/validate-gif-batch.py

      - name: GIF validator drift self-test
        run: python3 videos/validate-gif-batch.py --self-test

      - name: GIF builder guard self-test
        run: python3 videos/build-gif-deliverables.py --self-test

      - name: Check tracked published baseline
        run: python3 videos/validate-gif-batch.py --check-baseline videos/gif-batch-baseline-sha256.json

      - name: Test SleepRadar card
        run: node tests/sleepradar-card.test.js

      - name: Check run script syntax
        run: bash -n aqara_fp2_sleep/run.sh

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Audit runtime Python dependencies
        run: |
          python -m pip install pip-audit==2.10.1
          pip-audit -r aqara_fp2_sleep/requirements.txt --progress-spinner off

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.0"
          GITLEAKS_SHA256: "79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e"
        run: |
          curl -fsSLo /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Self-test secret scanner
        run: |
          scan_dir="$(mktemp -d)"
          trap 'rm -rf "$scan_dir"' EXIT
          printf 'api_key = "%s%s"\n' 'abcd1234efgh5678ijkl9012mnop3456' 'qrst7890uvwx' > "$scan_dir/fake-secret.txt"
          if gitleaks dir --no-banner --redact "$scan_dir"; then
            echo "Gitleaks self-test failed: fake secret was not detected" >&2
            exit 1
          fi

      - name: Scan current tree for secrets
        run: gitleaks dir --no-banner --redact --verbose .

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Build add-on image
        run: docker build --build-arg BUILD_VERSION=ci aqara_fp2_sleep
