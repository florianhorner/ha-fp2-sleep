name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml==6.0.2 yamllint==1.35.1 paho-mqtt pycryptodome

      - name: Lint YAML
        run: yamllint -c .yamllint .

      - name: Validate add-on package
        run: python3 scripts/validate_repository.py

      - name: Validator drift self-test
        run: python3 scripts/validate_repository.py --self-test

      - name: Test SleepRadar card
        run: node tests/sleepradar-card.test.js
