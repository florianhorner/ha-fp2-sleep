#:schema https://conductor.build/schemas/settings.repo.schema.json

# run.sh is bashio-only (real HA Supervisor + real MQTT broker + real Aqara
# credentials) and cannot run standalone — never wire it into scripts.run.
# The safe, useful local action is the same lint+validate loop CI and
# CONTRIBUTING.md require before every PR.

[scripts]
setup = "python3 -m venv .venv && .venv/bin/python -m pip install --upgrade pip && .venv/bin/python -m pip install -r requirements-ci.txt"
run = "git diff --check && .venv/bin/python -m py_compile aqara_fp2_sleep/aqara_fp2_sleep_poller.py scripts/validate_repository.py && .venv/bin/yamllint -c .yamllint . && .venv/bin/python scripts/validate_repository.py && .venv/bin/python scripts/validate_repository.py --self-test && node tests/sleepradar-card.test.js && bash -n aqara_fp2_sleep/run.sh"
run_mode = "concurrent"
